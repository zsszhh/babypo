version: '3.8'

services:
  babypoop-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: babypoop-server
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=change-me-in-production
      - PASSWORD=123456
      - DB_PATH=./data/babypoop.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s