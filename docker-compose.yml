version: "3.9"

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - babypoop-data:/app/data
    environment:
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - PASSWORD=${PASSWORD:-123456}
      - DB_PATH=/app/data/babypoop.db
    restart: unless-stopped

volumes:
  babypoop-data:
